        - /placeholder: Write Markdown here...
        - text: "# Code Showcase A tour of syntax highlighting across four languages. --- ## JavaScript Async/await with error handling: ```javascript async function fetchUser(id) { const res = await fetch(`/api/users/${id}`) if (!res.ok) throw new Error(`HTTP ${res.status}`) const user = await res.json() return user } fetchUser(42) .then(user => console.log('Got user:', user.name)) .catch(err => console.error('Failed:', err.message)) ``` --- ## Python Fibonacci with type hints and a generator: ```python from typing import Generator def fibonacci(limit: int) -> Generator[int, None, None]: a, b = 0, 1 while a < limit: yield a a, b = b, a + b # Print all Fibonacci numbers below 1000 for n in fibonacci(1000): print(n, end=\" \") ``` --- ## Java A generic stack implementation: ```java import java.util.ArrayDeque; import java.util.Deque; import java.util.NoSuchElementException; public class Stack<T> { private final Deque<T> deque = new ArrayDeque<>(); public void push(T item) { deque.push(item); } public T pop() { if (deque.isEmpty()) throw new NoSuchElementException(\"Stack is empty\"); return deque.pop(); } public T peek() { if (deque.isEmpty()) throw new NoSuchElementException(\"Stack is empty\"); return deque.peek(); } public boolean isEmpty() { return deque.isEmpty(); } public static void main(String[] args) { Stack<Integer> stack = new Stack<>(); stack.push(1); stack.push(2); stack.push(3); System.out.println(stack.pop()); // 3 System.out.println(stack.peek()); // 2 } } ``` --- ## MySQL Top customers by total spend with a subquery: ```sql SELECT u.id, u.name, u.email, SUM(o.total_amount) AS total_spent, COUNT(o.id) AS order_count, AVG(o.total_amount) AS avg_order_value FROM users u INNER JOIN orders o ON u.id = o.user_id WHERE o.status = 'completed' AND o.created_at >= DATE_SUB(NOW(), INTERVAL 1 YEAR) GROUP BY u.id, u.name, u.email HAVING total_spent > 1000 ORDER BY total_spent DESC LIMIT 20; ```"
