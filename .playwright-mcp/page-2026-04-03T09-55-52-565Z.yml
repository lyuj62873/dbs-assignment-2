    - paragraph [ref=e31]: "Top customers by total spend with a subquery:"
    - code [ref=e34]:
      - text: SELECT u.id, u.name, u.email, SUM(o.total_amount) AS total_spent, COUNT(o.id) AS order_count, AVG(o.total_amount) AS avg_order_value
      - text: FROM users u
      - text: INNER JOIN orders o ON u.id = o.user_id
