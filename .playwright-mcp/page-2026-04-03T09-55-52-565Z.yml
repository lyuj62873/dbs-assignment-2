    - heading "Java" [level=2] [ref=e24]
    - paragraph [ref=e25]: "A generic stack implementation:"
    - code [ref=e28]:
      - text: import java.util.ArrayDeque;
      - text: import java.util.Deque;
      - text: import java.util.NoSuchElementException;
      - text: "public class Stack<T> { private final Deque<T> deque = new ArrayDeque<>(); public void push(T item) { deque.push(item); } public T pop() { if (deque.isEmpty()) throw new NoSuchElementException(\"Stack is empty\"); return deque.pop(); } public T peek() { if (deque.isEmpty()) throw new NoSuchElementException(\"Stack is empty\"); return deque.peek(); } public boolean isEmpty() { return deque.isEmpty(); } public static void main(String[] args) { Stack<Integer> stack = new Stack<>(); stack.push(1); stack.push(2); stack.push(3); System.out.println(stack.pop()); // 3 System.out.println(stack.peek()); // 2 }"
      - text: "}"
