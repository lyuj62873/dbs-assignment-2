    - paragraph [ref=e19]: "Fibonacci with type hints and a generator:"
    - code [ref=e22]:
      - text: from typing import Generator
      - text: "def fibonacci(limit: int) -> Generator[int, None, None]: a, b = 0, 1 while a < limit: yield a a, b = b, a + b"
      - text: "# Print all Fibonacci numbers below 1000"
      - text: "for n in fibonacci(1000): print(n, end=\" \")"
